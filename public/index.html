<!DOCTYPE html>
<html lang="en-CA">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#050505">
    <!-- Performance Overclocking (Top-Notch Interactivity) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://images.pexels.com" />
    
    <!-- Critical Asset Priority -->

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400;500;600;700;800;900&family=Manrope:wght@200;300;400;500;600;700;800&display=swap" rel="stylesheet" />
    
    <!-- SEO & Social Mastery (Static Fallback) -->
    <title>AutoNorth Motors | Premium Trucks, SUVs & Cars in Edmonton</title>
    <meta name="description" content="Edmonton's #1 destination for certified premium vehicles. Zero dealer fees, 150-point inspections, and instant financing. Serving Alberta & Canada." />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://autonorth.ca/">
    <meta property="og:title" content="AutoNorth Motors | Premium Vehicles Edmonton">
    <meta property="og:description" content="Elite selection of trucks and SUVs with zero dealer fees. The better way to buy in Alberta.">
    <meta property="og:image" content="https://autonorth.ca/autonorth_cinematic_logo_1777279777559.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://autonorth.ca/">
    <meta property="twitter:title" content="AutoNorth Motors | Premium Vehicles Edmonton">
    <meta property="twitter:description" content="Elite selection of trucks and SUVs with zero dealer fees. The better way to buy in Alberta.">
    <meta property="twitter:image" content="https://autonorth.ca/autonorth_cinematic_logo_1777279777559.png">

    <!-- Index Signal Beacon (Bot Tracking) -->
    <script>
      (function() {
        var ua = navigator.userAgent;
        if (/bot|googlebot|crawler|spider|robot|crawling/i.test(ua)) {
          fetch('/api/bot-signal', { method: 'POST', body: JSON.stringify({ ua: ua }), headers: { 'Content-Type': 'application/json' } }).catch(function(){});
        }
      })();
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
